<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="LemonLemon/pics/mrLemonLemon.png">

    <link rel="stylesheet" href="LemonLemon/LemonLemon.css">
    <title>Document</title>
</head>
<body class="ll-body">

<header class="ll-header">
    <button class="ll-nav-toggle">
  ☰
  <span class="ll-nav-toggle-label">Meny</span>
</button>


    <div class="ll-header-inner">
        <div class="ll-header-inner">
  <a href="#home" class="ll-brand nav-link">
  <img src="LemonLemon/pics/lemonlemon-signature.png"
       alt="LemonLemon signature"
       class="ll-signature"
       height="250">
</a>

</div>

        
    </div>
</header>

<nav class="ll-nav">
  <div class="ll-nav-inner">

    <a class="ll-brand nav-link" data-page="home" href="#home">
      <img src="LemonLemon/pics/mrLemonLemon.png" alt="LemonLemon logo" height="250" class="ll-brand-logo">
      <h3 class="ll-h3">LemonLemon - Biluthyrning</h3>
    </a>

    <ul class="ll-body">

      <!-- Alltid synlig -->
      <li class="nav-item">
        <a class="nav-link" id="nav-home" data-page="home" href="#home">Home</a>
      </li>
      
      <li class="nav-item hidden" id="nav-userdashboard">
        <a class="nav-link" data-page="userdashboard" href="#userdashboard">Mina sidor</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" id="nav-login" data-page="login" href="#login">Login</a>
      </li>

      <!-- Admin-only -->
      <li class="nav-item admin-only hidden">
        <a class="nav-link" data-page="users" href="#users">Användare</a>
      </li>

      <li class="nav-item admin-only hidden">
        <a class="nav-link" data-page="cars" href="#cars">Bilar</a>
      </li>

      <li class="nav-item admin-only hidden">
        <a class="nav-link" data-page="bookings" href="#bookings">Bokningar</a>
      </li>

      <li class="nav-item">
        <a class="nav-link hidden" id="nav-logout" data-page="home" href="#home">Logout</a>
      </li>
    </ul>

  </div>
</nav>

<main id="content" class="ll-main"></main>

<!-- ===========================
     HOME
=========================== -->
<script type="text/template" id="home">
<section class="ll-section">

  <div class="ll-panel ll-flex-container">

    <!-- Vänster: scrollande lista -->
    <div class="ll-flex-item landing-list">
       <div class="ll-login-row">
  <h3 class="ll-h3">Logga in och hyr</h3>
   <button id="btn-login-landing" class="ll-btn ll-btn-login">Logga in</button>
</div>

        <div id="landing-cars-container">
            <div id="landing-cars" class="ll-list"></div>
        </div>
    </div>

    <!-- Höger: fullhöjdsbild -->
    <div class="ll-flex-item landing-image-wrapper">
        <img src="LemonLemon/pics/mrLemonLanding.png" 
             alt="LemonLemon car" 
             class="landing-image">
    </div>
  </div>
</section>
</script>


<!-- ===========================
     LOGIN
=========================== -->
<script type="text/template" id="login">
<section class="ll-section">
  <div class="ll-panel">
    <h2 class="ll-h2">Logga in</h2>

    <input id="username" placeholder="Användarnamn">
    <input id="password" type="password" placeholder="Lösenord">

    <button id="loginBtn" class="ll-btn">Logga in</button>

    <p id="error" style="color:red"></p>
  </div>
</section>
</script>

<!-- ===========================
     USER DASHBOARD
=========================== -->
<script type="text/template" id="userdashboard">
<section class="ll-section">
  <div class="ll-panel">
    
    <div class="ll-flex-container">

        <!-- VÄNSTER KOLUMN =  Bokningar knapp + sortering + Bilar -->
        <div class="ll-flex-item">

            <!-- Mina bokningar = dold tills man klickar -->
            <div id="user-bookings-container" style="display:none;">
                <div id="user-bookings" class="ll-list"></div>
            </div>

            <button class="ll-btn btn-positive" onclick="toggleUserBookings()">
                Visa mina bokningar
            </button>

            <!-- Sortering -->
            <div id="user-car-sort-dropdown" class="ll-sort-dropdown">
                <div class="ll-sort-trigger">Sortera bilar ▾</div>
                <div class="ll-sort-menu">
                    <button data-sort="name">Namn <span class="arrow">↑</span></button>
                    <button data-sort="type">Typ <span class="arrow">↑</span></button>
                </div>
            </div>

            <hr>
            <h2 class="ll-h2">Tillgängliga bilar</h2>

            <!-- Scrollande lista -->
            <div id="user-cars-container">
                <div id="user-cars" class="ll-list userdashboard-cars"></div>
            </div>

        </div>

        <!-- Bild med go snubbe -->
        <div class="ll-flex-item landing-image-wrapper">
            <img src="LemonLemon/pics/mrLemonCoke.png" 
                 alt="LemonLemon car"
                 class="landing-image ll-img--fill">
        </div>

    </div>

  </div>
</section>
</script>


<!-- ===========================
     USERS
=========================== -->
<script type="text/template" id="users">
<section class="ll-section">
  <div class="ll-panel">

    <div class="ll-flex-container">

      <!-- VÄNSTER: rubrik + lista -->
      <div class="ll-flex-item">
        <h3 class="ll-h3">Användare</h3>

        <div id="users-container">
          <div id="users-topbar" class="ll-topbar"></div>
          <div id="users-list" class="ll-list"></div>
        </div>
      </div>

      <!-- HÖGER = citronbilden -->
      <div class="ll-flex-item landing-image-wrapper">
        <img src="LemonLemon/pics/Lemonadmin.png"
             class="landing-image ll-img--fill">
      </div>

    </div>

  </div>
</section>
</script>


<!-- ===========================
     CARS (ADMIN)
=========================== -->
<script type="text/template" id="cars">
<section class="ll-section">
  <div class="ll-panel">

    <div class="ll-flex-container">

      <!-- Vänster: rubrik + lista -->
      <div class="ll-flex-item">
        <h3 class="ll-h3">Bilar</h3>

        <div id="cars-container">
          <div id="cars-topbar" class="ll-topbar"></div>
          <div id="cars-list" class="ll-list"></div>
        </div>
      </div>

      <!-- Höger = citronbild -->
      <div class="ll-flex-item landing-image-wrapper">
        <img src="LemonLemon/pics/Lemonadmin.png"
             class="landing-image ll-img--fill">
      </div>

    </div>

  </div>
</section>
</script>


<!-- ===========================
     BOOKINGS (ADMIN)
=========================== -->
<script type="text/template" id="bookings">
<section class="ll-section">
  <div class="ll-panel">

    <div class="ll-flex-container">

      <!-- Vänster: rubrik + lista -->
      <div class="ll-flex-item">
        <h3 class="ll-h3">Bokningar</h3>

        <div id="bookings-container">
          <div id="bookings-topbar" class="ll-topbar"></div>
          <div id="bookings-list" class="ll-list"></div>
        </div>
      </div>

      <!-- Höger: citronbild -->
      <div class="ll-flex-item landing-image-wrapper">
        <img src="LemonLemon/pics/Lemonadmin.png"
             class="landing-image ll-img--fill">
      </div>

    </div>

  </div>
</section>
</script>


<!-- ===========================
     FOOTER
=========================== -->
<footer class="ll-footer">

    <div class="footer-box footer-box-polly">
        <a href="https://www.cloetta.se/varumarken/polly/" target="_blank">
            <img src="LemonLemon/pics/polly.png" class="footer-ad" alt="Polly reklam">
        </a>
    </div>

    <div class="footer-box footer-box-specsavers">
        <a href="https://www.specsavers.se" target="_blank">
            <img src="LemonLemon/pics/speccsavers.png" class="footer-ad" alt="Specsavers reklam">
        </a>
    </div>

    <div class="footer-box footer-box-max">
        <a href="https://www.max.se" target="_blank">
            <img src="LemonLemon/pics/max.png" class="footer-ad" alt="Max reklam">
        </a>
    </div>

</footer>


<!-- ===========================
     MODAL 
=========================== -->
<div id="generic-modal" class="hidden">
  <div class="ll-modal-panel">
    <h2 id="modal-title"></h2>

    <div id="modal-fields"></div>

    <div class="modal-buttons">
      <button id="modal-save">Spara</button>
      <button id="modal-delete">Ta bort</button>
      <button id="modal-cancel">Stäng</button>
    </div>
  </div>
</div>
<!-- ================================
      POPUP
  =================================-->
<div id="ll-global-popup" class="ll-popup hidden">
  <span class="ll-popup-close">&times;</span>
  <h4 id="ll-global-popup-title" class="ll-h4"></h4>
  <p id="ll-global-popup-text"></p>
</div>

<script src="index.js"></script>
<script src="LemonLemon/LemonLemon.js"></script>


</body>
</html>
